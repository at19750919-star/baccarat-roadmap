<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百家樂板路單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="title-bar">
      <div class="brand">正版路單</div>
      <div class="title-controls">
        <div class="action-buttons">
          <button class="btn action-btn btn-banker" data-action="B">莊</button>
          <button class="btn action-btn btn-player" data-action="P">閒</button>
          <button class="btn action-btn btn-tie" data-action="T">和</button>
          <button class="btn action-btn btn-banker-pair" data-action="B" data-mod="bp">莊對</button>
          <button class="btn action-btn btn-player-pair" data-action="P" data-mod="pp">閒對</button>
          <button class="btn action-btn btn-lucky6" data-action="B" data-mod="l6">6</button>
          <button class="btn action-btn btn-confirm" id="confirmBtn">確定</button>
        </div>
        <div class="util-buttons">
          <button class="btn action-btn btn-undo" id="undoBtn">退</button>
          <button class="btn action-btn btn-clear" id="clearBtn">清</button>
        </div>
      </div>
      <div class="stats-inline">
        <span>時間：<b>30</b></span>
        <span>靴號：<b>1</b></span>
        <span>桌號：<b>1</b></span>
        <span>局數：<b id="totalCount">0</b></span>
      </div>
    </header>

    <!-- 大路 (full width on top) -->
    <section class="panel big-panel">
      <div id="bigRoad" class="grid-board big-road" data-label="大路"></div>
    </section>

    <!-- 中間:左(大眼仔/小路) | 右(甲由路/公告欄) -->
    <section class="mid-row">
      <div class="mid-col">
        <div class="panel derived-panel">
          <div id="bigEye" class="grid-board derived-road" data-label="大眼仔"></div>
        </div>
        <div class="panel derived-panel">
          <div id="smallRoad" class="grid-board derived-road" data-label="小路"></div>
        </div>
      </div>
      <div class="mid-col">
        <div class="panel derived-panel">
          <div id="cockroachRoad" class="grid-board derived-road" data-label="蟑螂路"></div>
        </div>
        <div class="panel notice-panel">
          <div class="notice-icons">
            <!-- 音效:幾何喇叭 + 三層弧形聲波(點擊開關 TTS) -->
            <button class="deco-icon-btn" id="soundToggleBtn" aria-label="音效" title="音效">
              <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="35,6 85,6 114,35 114,85 85,114 35,114 6,85 6,35" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <polygon points="38,14 82,14 106,38 106,82 82,106 38,106 14,82 14,38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.55"/>
                <!-- 喇叭本體:梯形錐 + 矩形箱 -->
                <polygon points="32,52 48,52 64,36 64,84 48,68 32,68" fill="currentColor"/>
                <line x1="36" y1="56" x2="44" y2="56" stroke="#fafafa" stroke-width="0.8" opacity="0.7"/>
                <line x1="36" y1="64" x2="44" y2="64" stroke="#fafafa" stroke-width="0.8" opacity="0.7"/>
                <!-- 三層弧形聲波 -->
                <path d="M 72,48 A 14 14 0 0 1 72 72" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M 80,41 A 20 20 0 0 1 80 79" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.65"/>
                <path d="M 88,34 A 26 26 0 0 1 88 86" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
                <!-- 靜音斜線(預設隱藏,muted 時顯示) -->
                <line class="mute-slash" x1="22" y1="22" x2="98" y2="98" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                <circle cx="60" cy="6" r="1.6" fill="currentColor"/>
                <circle cx="60" cy="114" r="1.6" fill="currentColor"/>
                <circle cx="6" cy="60" r="1.6" fill="currentColor"/>
                <circle cx="114" cy="60" r="1.6" fill="currentColor"/>
              </svg>
            </button>

            <!-- 音樂:幾何音符 + 扇形放射光束 -->
            <button class="deco-icon-btn" aria-label="音樂" title="音樂">
              <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="35,6 85,6 114,35 114,85 85,114 35,114 6,85 6,35" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <polygon points="38,14 82,14 106,38 106,82 82,106 38,106 14,82 14,38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.55"/>
                <g stroke="currentColor" stroke-width="0.6" opacity="0.32" fill="none">
                  <line x1="60" y1="92" x2="60" y2="28"/>
                  <line x1="60" y1="92" x2="42" y2="32"/>
                  <line x1="60" y1="92" x2="78" y2="32"/>
                  <line x1="60" y1="92" x2="26" y2="44"/>
                  <line x1="60" y1="92" x2="94" y2="44"/>
                  <line x1="60" y1="92" x2="16" y2="62"/>
                  <line x1="60" y1="92" x2="104" y2="62"/>
                </g>
                <ellipse cx="50" cy="80" rx="11" ry="8" fill="currentColor" transform="rotate(-25 50 80)"/>
                <rect x="58.5" y="32" width="3" height="48" fill="currentColor"/>
                <polygon points="61.5,32 82,40 82,48 61.5,40" fill="currentColor"/>
                <polygon points="61.5,46 82,54 82,62 61.5,54" fill="currentColor"/>
                <circle cx="60" cy="6" r="1.6" fill="currentColor"/>
                <circle cx="60" cy="114" r="1.6" fill="currentColor"/>
                <circle cx="6" cy="60" r="1.6" fill="currentColor"/>
                <circle cx="114" cy="60" r="1.6" fill="currentColor"/>
              </svg>
            </button>

            <!-- 增加音量:喇叭 + 階梯上升音量條 + 加號徽章 -->
            <button class="deco-icon-btn" id="volumeUpBtn" aria-label="增加音量" title="增加音量">
              <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="35,6 85,6 114,35 114,85 85,114 35,114 6,85 6,35" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <polygon points="38,14 82,14 106,38 106,82 82,106 38,106 14,82 14,38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.55"/>
                <!-- 喇叭 -->
                <polygon points="28,54 42,54 58,40 58,80 42,66 28,66" fill="currentColor"/>
                <!-- 階梯音量條:短→中→高 -->
                <rect x="66" y="66" width="4" height="10" fill="currentColor"/>
                <rect x="76" y="56" width="4" height="20" fill="currentColor" opacity="0.85"/>
                <rect x="86" y="44" width="4" height="32" fill="currentColor" opacity="0.7"/>
                <!-- 加號徽章:圓框 + 十字 -->
                <circle cx="92" cy="30" r="10" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <line x1="92" y1="24" x2="92" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="86" y1="30" x2="98" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="60" cy="6" r="1.6" fill="currentColor"/>
                <circle cx="60" cy="114" r="1.6" fill="currentColor"/>
                <circle cx="6" cy="60" r="1.6" fill="currentColor"/>
                <circle cx="114" cy="60" r="1.6" fill="currentColor"/>
              </svg>
            </button>

            <!-- 減少音量:喇叭 + 階梯下降音量條 + 減號徽章 -->
            <button class="deco-icon-btn" id="volumeDownBtn" aria-label="減少音量" title="減少音量">
              <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="35,6 85,6 114,35 114,85 85,114 35,114 6,85 6,35" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <polygon points="38,14 82,14 106,38 106,82 82,106 38,106 14,82 14,38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.55"/>
                <!-- 喇叭 -->
                <polygon points="28,54 42,54 58,40 58,80 42,66 28,66" fill="currentColor"/>
                <!-- 階梯音量條:高→中→短 -->
                <rect x="66" y="44" width="4" height="32" fill="currentColor"/>
                <rect x="76" y="56" width="4" height="20" fill="currentColor" opacity="0.85"/>
                <rect x="86" y="66" width="4" height="10" fill="currentColor" opacity="0.7"/>
                <!-- 減號徽章:圓框 + 橫線 -->
                <circle cx="92" cy="30" r="10" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <line x1="86" y1="30" x2="98" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="60" cy="6" r="1.6" fill="currentColor"/>
                <circle cx="60" cy="114" r="1.6" fill="currentColor"/>
                <circle cx="6" cy="60" r="1.6" fill="currentColor"/>
                <circle cx="114" cy="60" r="1.6" fill="currentColor"/>
              </svg>
            </button>

            <!-- 截圖:Art Deco 四角 L 形框 + 中央十字準心 -->
            <button class="deco-icon-btn" id="screenshotBtn" aria-label="截圖" title="截圖">
              <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="35,6 85,6 114,35 114,85 85,114 35,114 6,85 6,35" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <polygon points="38,14 82,14 106,38 106,82 82,106 38,106 14,82 14,38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.55"/>
                <!-- 四角 L 形裝飾(階梯式) -->
                <g stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="square">
                  <!-- 左上 -->
                  <polyline points="30,48 30,30 48,30"/>
                  <!-- 右上 -->
                  <polyline points="72,30 90,30 90,48"/>
                  <!-- 左下 -->
                  <polyline points="30,72 30,90 48,90"/>
                  <!-- 右下 -->
                  <polyline points="72,90 90,90 90,72"/>
                </g>
                <!-- 次層細 L(內縮,Art Deco 階梯感) -->
                <g stroke="currentColor" stroke-width="0.9" fill="none" opacity="0.55" stroke-linecap="square">
                  <polyline points="36,50 36,36 50,36"/>
                  <polyline points="70,36 84,36 84,50"/>
                  <polyline points="36,70 36,84 50,84"/>
                  <polyline points="70,84 84,84 84,70"/>
                </g>
                <!-- 中央十字準心 -->
                <line x1="50" y1="60" x2="70" y2="60" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="60" y1="50" x2="60" y2="70" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <circle cx="60" cy="60" r="2.2" fill="currentColor"/>
                <circle cx="60" cy="6" r="1.6" fill="currentColor"/>
                <circle cx="60" cy="114" r="1.6" fill="currentColor"/>
                <circle cx="6" cy="60" r="1.6" fill="currentColor"/>
                <circle cx="114" cy="60" r="1.6" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- 底部:統計 | 珠盤路 | 下局指示 | 貨幣限額 -->
    <section class="bottom-row">
      <div class="panel stats-panel">
        <ul class="stats-list">
          <li class="stat-banker"><span class="k">莊</span><b id="cntB">0</b></li>
          <li class="stat-player"><span class="k">閒</span><b id="cntP">0</b></li>
          <li class="stat-tie"><span class="k">和</span><b id="cntT">0</b></li>
          <li class="stat-banker-pair"><span class="k">莊對</span><b id="cntBP">0</b></li>
          <li class="stat-player-pair"><span class="k">閒對</span><b id="cntPP">0</b></li>
          <li class="stat-lucky6"><span class="k">幸運6</span><b id="cntL6">0</b></li>
        </ul>
      </div>

      <div class="panel bead-panel">
        <div id="beadBoard" class="grid-board bead-board" data-label="珠子路"></div>
      </div>

      <div class="panel predict-panel">
        <div class="predict-title">下局指示</div>
        <div class="predict-legend">
          <div class="leg-row">
            <span class="leg-tag banker">莊</span>
            <span class="leg-tag player">閒</span>
          </div>
          <div class="leg-row">
            <span class="leg-mark circle red"></span>
            <span class="leg-mark circle blue"></span>
          </div>
          <div class="leg-row">
            <span class="leg-mark solid red"></span>
            <span class="leg-mark solid blue"></span>
          </div>
          <div class="leg-row">
            <span class="leg-mark slash red"></span>
            <span class="leg-mark slash blue"></span>
          </div>
        </div>
      </div>

      <div class="panel limit-panel">
        <div class="limit-row-item banker-box">
          <div class="limit-label">莊/閒</div>
          <div class="limit-values">
            <label class="limit-row"><span class="limit-key">最高：</span><input type="number" class="limit-input" data-k="bpMax" value="10000" min="0"></label>
            <label class="limit-row"><span class="limit-key">最低：</span><input type="number" class="limit-input" data-k="bpMin" value="100" min="0"></label>
          </div>
        </div>
        <div class="limit-row-item tie-box">
          <div class="limit-label">和</div>
          <div class="limit-values">
            <label class="limit-row"><span class="limit-key">最高：</span><input type="number" class="limit-input" data-k="tMax" value="10000" min="0"></label>
            <label class="limit-row"><span class="limit-key">最低：</span><input type="number" class="limit-input" data-k="tMin" value="100" min="0"></label>
          </div>
        </div>
        <div class="limit-row-item pair-box">
          <div class="limit-label">對子</div>
          <div class="limit-values">
            <label class="limit-row"><span class="limit-key">最高：</span><input type="number" class="limit-input" data-k="pMax" value="10000" min="0"></label>
            <label class="limit-row"><span class="limit-key">最低：</span><input type="number" class="limit-input" data-k="pMin" value="100" min="0"></label>
          </div>
        </div>
        <div class="limit-row-item lucky-box">
          <div class="limit-label">幸運6</div>
          <div class="limit-values">
            <label class="limit-row"><span class="limit-key">最高：</span><input type="number" class="limit-input" data-k="l6Max" value="10000" min="0"></label>
            <label class="limit-row"><span class="limit-key">最低：</span><input type="number" class="limit-input" data-k="l6Min" value="100" min="0"></label>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
